name: Fetch SteamSpy Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tag data via Python
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.parse
          import json
          import time
          import os

          os.makedirs("data", exist_ok=True)

          tags = [
            ("Roguelike",     "Roguelike"),
            ("Roguelite",     "Roguelite"),
            ("Metroidvania",  "Metroidvania"),
            ("Platformer",    "Platformer"),
            ("Action RPG",    "Action_RPG"),
            ("Survival",      "Survival"),
            ("Tower Defense", "Tower_Defense"),
            ("Puzzle",        "Puzzle"),
            ("Visual Novel",  "Visual_Novel"),
            ("Horror",        "Horror"),
            ("Sandbox",       "Sandbox"),
            ("Strategy",      "Strategy"),
            ("Simulation",    "Simulation"),
            ("Fighting",      "Fighting"),
            ("Shoot 'em up",  "Shoot__em_up"),
          ]

          headers = {
            "User-Agent": "Mozilla/5.0 (compatible; IndieScope/1.0)"
          }

          for tag_name, file_name in tags:
            encoded = urllib.parse.quote(tag_name)
            url = f"https://steamspy.com/api.php?request=tag&tag={encoded}"
            print(f"Fetching: {tag_name} -> data/{file_name}.json")
            try:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                raw = resp.read().decode("utf-8")
                data = json.loads(raw)
                with open(f"data/{file_name}.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False)
                print(f"  OK: {len(data)} games")
            except Exception as e:
              print(f"  ERROR: {e}")
            time.sleep(2)

          # manifest生成
          import datetime
          manifest = {
            "updated_at": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "tags": []
          }
          tag_meta = [
            {"en":"Roguelike",     "ja":"ローグライク",       "file":"Roguelike"},
            {"en":"Roguelite",     "ja":"ローグライト",       "file":"Roguelite"},
            {"en":"Metroidvania",  "ja":"メトロイドヴァニア", "file":"Metroidvania"},
            {"en":"Platformer",    "ja":"プラットフォーマー", "file":"Platformer"},
            {"en":"Action RPG",    "ja":"アクションRPG",      "file":"Action_RPG"},
            {"en":"Survival",      "ja":"サバイバル",         "file":"Survival"},
            {"en":"Tower Defense", "ja":"タワーディフェンス", "file":"Tower_Defense"},
            {"en":"Puzzle",        "ja":"パズル",             "file":"Puzzle"},
            {"en":"Visual Novel",  "ja":"ビジュアルノベル",   "file":"Visual_Novel"},
            {"en":"Horror",        "ja":"ホラー",             "file":"Horror"},
            {"en":"Sandbox",       "ja":"サンドボックス",     "file":"Sandbox"},
            {"en":"Strategy",      "ja":"ストラテジー",       "file":"Strategy"},
            {"en":"Simulation",    "ja":"シミュレーション",   "file":"Simulation"},
            {"en":"Fighting",      "ja":"格闘",               "file":"Fighting"},
            {"en":"Shoot 'em up",  "ja":"シューティング",     "file":"Shoot__em_up"},
          ]
          for t in tag_meta:
            count = 0
            path = f"data/{t['file']}.json"
            if os.path.exists(path):
              try:
                with open(path) as f:
                  count = len(json.load(f))
              except:
                pass
            manifest["tags"].append({**t, "count": count})

          with open("data/manifest.json", "w", encoding="utf-8") as f:
            json.dump(manifest, f, ensure_ascii=False, indent=2)
          print("manifest.json generated")
          PYEOF

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update SteamSpy data $(date -u +%Y-%m-%d)" && git push)
